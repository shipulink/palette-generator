<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Pick colors and build palettes" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <title>Palette Generator</title>
  </head>
  <body>
    <main class="app">
      <div class="palette-area">

        <div class="palette-with-buttons">
          <div class="step-controls">
            <button class="step-btn" id="top-minus">−</button>
            <button class="step-btn" id="top-plus">+</button>
          </div>
          <div class="palette-main">
            <div id="palette-labels"></div>
            <div id="palette"></div>
          </div>
          <div class="step-controls">
            <button class="step-btn" id="bot-minus">−</button>
            <button class="step-btn" id="bot-plus">+</button>
          </div>
        </div>

        <div id="palette-controls">
          <button class="reset-btn" id="top-reset">↺</button>
          <div class="slider-group">
            <div class="vslider">
              <div class="vslider-track">
                <input type="range" id="top-h" min="0" max="360" step="1">
              </div>
              <label for="top-h">H</label>
            </div>
            <div class="vslider">
              <div class="vslider-track">
                <input type="range" id="top-s" min="0" max="100" step="1">
              </div>
              <label for="top-s">S</label>
            </div>
            <div class="vslider">
              <div class="vslider-track">
                <input type="range" id="top-v" min="0" max="100" step="1">
              </div>
              <label for="top-v">B</label>
            </div>
          </div>
          <div class="slider-group">
            <div class="vslider">
              <div class="vslider-track">
                <input type="range" id="bot-h" min="0" max="360" step="1">
              </div>
              <label for="bot-h">H</label>
            </div>
            <div class="vslider">
              <div class="vslider-track">
                <input type="range" id="bot-s" min="0" max="100" step="1">
              </div>
              <label for="bot-s">S</label>
            </div>
            <div class="vslider">
              <div class="vslider-track">
                <input type="range" id="bot-v" min="0" max="100" step="1">
              </div>
              <label for="bot-v">B</label>
            </div>
          </div>
          <button class="reset-btn" id="bot-reset">↺</button>
        </div>

      </div>
    </main>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Color picker">
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-card">
        <div id="color-preview"></div>
        <div id="color-wheel-container"></div>
        <div class="color-inputs">
          <div class="hex-row">
            <span class="input-prefix">#</span>
            <input id="hex-input" type="text" inputmode="text"
              maxlength="6" placeholder="rrggbb"
              autocomplete="off" spellcheck="false" />
          </div>
          <div class="rgb-row">
            <div class="rgb-field">
              <label for="r-input">R</label>
              <input id="r-input" type="text" inputmode="numeric" maxlength="3" />
            </div>
            <div class="rgb-field">
              <label for="g-input">G</label>
              <input id="g-input" type="text" inputmode="numeric" maxlength="3" />
            </div>
            <div class="rgb-field">
              <label for="b-input">B</label>
              <input id="b-input" type="text" inputmode="numeric" maxlength="3" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <button id="export-btn">Export .pal</button>

    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5/dist/iro.min.js"></script>
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
  </body>
</html>
